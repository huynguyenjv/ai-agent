# GitLab CI — AI Code Review
#
# Yêu cầu CI/CD Variables (Settings → CI/CD → Variables):
#   AI_AGENT_URL   : URL AI Coding Agent, ví dụ https://ai-agent.company.com
#   AI_AGENT_KEY   : X-Api-Key của agent (masked)
#
# Job chạy trên mỗi MR event. Không fail pipeline theo blocker — agent chỉ comment,
# người review quyết định merge.

stages:
  - review

ai_code_review:
  stage: review
  image: curlimages/curl:8.5.0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    GIT_STRATEGY: none
  script:
    - |
      set -eu
      echo "Calling AI agent: $AI_AGENT_URL/review/pr"
      echo "Project: $CI_PROJECT_PATH | MR: !$CI_MERGE_REQUEST_IID | Commit: $CI_COMMIT_SHORT_SHA"

      HTTP_CODE=$(curl -sS -o review_result.json -w "%{http_code}" \
        -X POST "$AI_AGENT_URL/review/pr" \
        -H "X-Api-Key: $AI_AGENT_KEY" \
        -H "Content-Type: application/json" \
        --max-time 180 \
        -d "{
          \"provider\": \"gitlab\",
          \"repo\": \"$CI_PROJECT_PATH\",
          \"pr_id\": $CI_MERGE_REQUEST_IID,
          \"mode\": \"pr\"
        }")

      echo "HTTP $HTTP_CODE"
      cat review_result.json || true
      echo

      if [ "$HTTP_CODE" != "200" ]; then
        echo "AI review failed (HTTP $HTTP_CODE). Pipeline continues."
        exit 0
      fi

      echo "AI review posted to MR !$CI_MERGE_REQUEST_IID"
  artifacts:
    when: always
    paths:
      - review_result.json
    expire_in: 1 week
  allow_failure: true
  timeout: 5 minutes
