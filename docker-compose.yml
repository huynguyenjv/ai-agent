version: '3.8'

# =============================================================================
# AI Coding Agent — New Architecture
# =============================================================================
# Development:
#   docker-compose up -d qdrant         # Start Qdrant only
#   python main.py                       # Run server locally
#
# Production:
#   docker-compose up -d                 # Full stack
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # AI Agent Application (Cloud VM)
  # ---------------------------------------------------------------------------
  ai-agent:
    build: .
    container_name: ai-agent
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - API_KEY=${API_KEY:-}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://vllm:8000/v1}
      - VLLM_MODEL=${VLLM_MODEL:-qwen2.5-coder}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      qdrant:
        condition: service_healthy
    command: ["python", "main.py"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # vLLM Server (GPU required) — Qwen2.5-Coder-7B-Instruct
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    container_name: ai-agent-vllm
    restart: always
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      --port 8000
      --max-model-len ${VLLM_MAX_MODEL_LEN:-32768}
      --gpu-memory-utilization ${VLLM_GPU_UTIL:-0.85}
      --max-num-seqs ${VLLM_MAX_NUM_SEQS:-16}
      --enable-prefix-caching
      --trust-remote-code

  # ---------------------------------------------------------------------------
  # Qdrant Vector Database — bound to 127.0.0.1 in production
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-agent-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_data:
    driver: local
