worker_processes auto;
events { worker_connections 1024; }

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rid=$http_x_correlation_id';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 75s;
    client_max_body_size 50m;   # chunk upload từ MCP có thể lớn

    # Rate limit: 30 req/s / IP, burst 60
    limit_req_zone $binary_remote_addr zone=ai_agent:10m rate=30r/s;

    upstream ai_agent_upstream {
        server ai-agent:8080;
        keepalive 16;
    }

    # HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;

        # SSE streaming: disable proxy buffering
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        limit_req zone=ai_agent burst=60 nodelay;

        location / {
            proxy_pass http://ai_agent_upstream;
        }

        # /review/pr có thể chạy 30-120s → nới timeout
        location /review/ {
            proxy_pass http://ai_agent_upstream;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location /health {
            proxy_pass http://ai_agent_upstream;
            access_log off;
        }
    }
}
